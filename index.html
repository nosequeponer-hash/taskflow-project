<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --color-bg:       #0f0f0f;
      --color-surface:  #1a1a1a;
      --color-border:   #2a2a2a;
      --color-accent:   #c8f135;
      --color-accent2:  #ff6b35;
      --color-text:     #f0f0f0;
      --color-muted:    #888;

      --font-display: 'Syne', sans-serif;
      --font-body:    'DM Sans', sans-serif;

      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 1.5rem;
      --space-lg: 2.5rem;

      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-sm) var(--space-lg);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    header .logo span { color: var(--color-accent); }

    header nav { display: flex; gap: var(--space-sm); }

    header nav a {
      color: var(--color-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    header nav a:hover { color: var(--color-text); }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 61px);
    }

    aside {
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    aside h2 {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: var(--space-xs);
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem var(--space-sm);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--color-muted);
      transition: background 0.2s, color 0.2s;
    }

    .nav-item:hover { background: var(--color-border); color: var(--color-text); }

    .nav-item.active { background: var(--color-accent); color: #000; font-weight: 500; }

    .nav-item .count {
      font-size: 0.75rem;
      background: rgba(255,255,255,0.1);
      padding: 0.1rem 0.4rem;
      border-radius: 99px;
    }

    .nav-item.active .count { background: rgba(0,0,0,0.15); }

    main { padding: var(--space-lg); overflow-y: auto; }

    main h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-md);
    }

    main h1 span { color: var(--color-accent); }

    /* ─────────────────────────────────────────
       FORMULARIO para añadir tareas
       El usuario escribe aquí su nueva tarea.
    ───────────────────────────────────────── */
    .add-task-form {
      display: flex;
      gap: var(--space-xs);
      margin-bottom: var(--space-lg);
    }

    .add-task-form input {
      flex: 1;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 0.75rem var(--space-sm);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-task-form input:focus { border-color: var(--color-accent); }

    .add-task-form input::placeholder { color: var(--color-muted); }

    .add-task-form button {
      background: var(--color-accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 0.75rem var(--space-md);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .add-task-form button:hover { opacity: 0.85; }

    /* ─────────────────────────────────────────
       BUSCADOR (Bonus)
    ───────────────────────────────────────── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      margin-bottom: var(--space-md);
    }

    .search-bar input {
      flex: 1;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 0.6rem var(--space-sm);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus { border-color: var(--color-muted); }
    .search-bar input::placeholder { color: var(--color-muted); }

    .search-bar span {
      color: var(--color-muted);
      font-size: 1.1rem;
    }

    section { margin-bottom: var(--space-lg); }

    section h2 {
      font-family: var(--font-display);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: var(--space-sm);
      padding-bottom: var(--space-xs);
      border-bottom: 1px solid var(--color-border);
    }

    /* ─────────────────────────────────────────
       TARJETAS DE TAREAS
    ───────────────────────────────────────── */
    .task-card {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-sm) var(--space-md);
      margin-bottom: var(--space-xs);
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
    }

    .task-card:hover { background: #222; border-color: #444; transform: translateX(4px); }

    .task-card.done { opacity: 0.5; }
    .task-card.done .task-title { text-decoration: line-through; }

    /* Tareas ocultas por el buscador */
    .task-card.hidden { display: none; }

    .task-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      flex-shrink: 0;
      transition: background 0.3s, border-color 0.3s;
    }

    .task-card.done .task-check { background: var(--color-accent); border-color: var(--color-accent); }

    .task-title { flex: 1; font-size: 0.95rem; }

    /* ─────────────────────────────────────────
       BOTÓN DE ELIMINAR
       Aparece en cada tarea para borrarla.
    ───────────────────────────────────────── */
    .btn-delete {
      background: transparent;
      border: none;
      color: var(--color-muted);
      font-size: 1rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover { color: var(--color-accent2); background: #ff6b3520; }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      aside {
        border-right: none;
        border-bottom: 1px solid var(--color-border);
        flex-direction: row;
        flex-wrap: wrap;
        padding: var(--space-sm);
      }

      aside h2 { width: 100%; }

      main { padding: var(--space-sm); }

      main h1 { font-size: 1.5rem; }

      .add-task-form input { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Task<span>Flow</span></div>
    <nav>
      <a href="#">Dashboard</a>
      <a href="#">Equipo</a>
      <a href="#">Ajustes</a>
    </nav>
  </header>

  <div class="layout">

    <aside>
      <h2>Categorías</h2>
      <div class="nav-item active">📋 Todas</div>
      <div class="nav-item">💻 Desarrollo</div>
      <div class="nav-item">🎨 Diseño</div>
      <div class="nav-item">📊 Análisis</div>
      <div class="nav-item">📝 Documentación</div>
    </aside>

    <main>
      <h1>Mis <span>Tareas</span></h1>

      <!-- Formulario para añadir tareas -->
      <div class="add-task-form">
        <input type="text" id="task-input" placeholder="Escribe una nueva tarea..." />
        <button id="btn-add">+ Añadir</button>
      </div>

      <!-- Buscador (Bonus) -->
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Buscar tareas..." />
      </div>

      <!-- Lista de tareas (se rellena con JavaScript) -->
      <section>
        <h2>📋 Tareas</h2>
        <div id="task-list"></div>
      </section>

    </main>
  </div>

  <!-- Vinculamos el archivo JavaScript -->
  <script src="app.js"></script>

</body>
</html>
