<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>

  <!-- Tailwind CSS via CDN con configuración personalizada -->
  <script>
    // ─────────────────────────────────────────
    // tailwind.config
    // Aquí configuramos Tailwind: activamos el
    // modo oscuro por clase (darkMode: 'class')
    // y definimos colores personalizados.
    // ─────────────────────────────────────────
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#c8f135',
            danger: '#ff6b35',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<!--
  La clase "dark" en <html> activa el modo oscuro.
  JavaScript la añade o quita según el botón.
  En modo oscuro, las clases "dark:..." se activan.
-->
<body class="bg-white dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 font-body min-h-screen transition-colors duration-300">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-10 py-4 bg-neutral-100 dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800 sticky top-0 z-50">
    <div class="font-display text-2xl font-extrabold tracking-tight">
      Task<span class="text-accent">Flow</span>
    </div>
    <nav class="flex items-center gap-6">
      <a href="#" class="text-neutral-500 dark:text-neutral-400 text-sm hover:text-neutral-900 dark:hover:text-white transition-colors duration-200 focus:outline-none focus:underline">Dashboard</a>
      <a href="#" class="text-neutral-500 dark:text-neutral-400 text-sm hover:text-neutral-900 dark:hover:text-white transition-colors duration-200 focus:outline-none focus:underline">Equipo</a>
      <a href="#" class="text-neutral-500 dark:text-neutral-400 text-sm hover:text-neutral-900 dark:hover:text-white transition-colors duration-200 focus:outline-none focus:underline">Ajustes</a>

      <!-- Botón para alternar modo oscuro/claro -->
      <button
        id="theme-toggle"
        class="ml-2 px-3 py-1.5 rounded-lg bg-neutral-200 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-300 text-sm font-medium hover:bg-neutral-300 dark:hover:bg-neutral-700 focus:outline-none focus:ring-2 focus:ring-accent transition-all duration-200"
      >
        <span id="theme-icon">☀️</span>
      </button>
    </nav>
  </header>

  <!-- LAYOUT: en móvil una columna, en escritorio aside + main -->
  <div class="grid grid-cols-1 md:grid-cols-[240px_1fr] min-h-[calc(100vh-61px)]">

    <!-- ASIDE -->
    <aside class="bg-neutral-100 dark:bg-neutral-900 border-b md:border-b-0 md:border-r border-neutral-200 dark:border-neutral-800 p-6 flex flex-row flex-wrap md:flex-col gap-1">
      <h2 class="font-display text-xs tracking-widest uppercase text-neutral-400 mb-1 w-full">Categorías</h2>
      <div class="flex items-center justify-between px-4 py-2 rounded-xl bg-accent text-black font-medium text-sm cursor-pointer">📋 Todas</div>
      <div class="flex items-center justify-between px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors duration-200">💻 Desarrollo</div>
      <div class="flex items-center justify-between px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors duration-200">🎨 Diseño</div>
      <div class="flex items-center justify-between px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors duration-200">📊 Análisis</div>
      <div class="flex items-center justify-between px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-neutral-800 transition-colors duration-200">📝 Documentación</div>
    </aside>

    <!-- MAIN -->
    <main class="p-6 md:p-10 overflow-y-auto">
      <h1 class="font-display text-3xl md:text-4xl font-extrabold tracking-tight mb-6">
        Mis <span class="text-accent">Tareas</span>
      </h1>

      <!-- Formulario para añadir tareas -->
      <div class="flex gap-2 mb-6">
        <input
          type="text"
          id="task-input"
          placeholder="Escribe una nueva tarea..."
          class="flex-1 bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl px-4 py-3 text-sm text-neutral-900 dark:text-neutral-100 placeholder-neutral-400 outline-none focus:border-accent focus:ring-2 focus:ring-accent/30 transition-all duration-200"
        />
        <button
          id="btn-add"
          class="bg-accent text-black font-display font-bold text-sm px-5 py-3 rounded-xl hover:opacity-80 focus:outline-none focus:ring-2 focus:ring-accent/50 active:scale-95 transition-all duration-200"
        >
          + Añadir
        </button>
      </div>

      <!-- Buscador (Bonus) -->
      <div class="flex items-center gap-2 mb-8 bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-xl px-4 py-2.5 focus-within:border-neutral-400 dark:focus-within:border-neutral-600 transition-all duration-200">
        <span class="text-neutral-400">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Buscar tareas..."
          class="flex-1 bg-transparent text-sm text-neutral-900 dark:text-neutral-100 placeholder-neutral-400 outline-none"
        />
      </div>

      <!-- Lista de tareas (se rellena con JavaScript) -->
      <section>
        <h2 class="font-display text-xs tracking-widest uppercase text-neutral-400 mb-3 pb-2 border-b border-neutral-200 dark:border-neutral-800">📋 Tareas</h2>
        <div id="task-list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
