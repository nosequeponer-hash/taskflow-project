<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- 1. Primero cargamos Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 2. Después configuramos Tailwind -->
  <script>
    // ─────────────────────────────────────────
    // tailwind.config
    // darkMode: 'class' activa el modo oscuro
    // cuando el elemento <html> tiene la clase "dark"
    // ─────────────────────────────────────────
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#c8f135',
            danger: '#ff6b35',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-white dark:bg-[#0f0f0f] text-neutral-900 dark:text-neutral-100 min-h-screen transition-colors duration-300" style="font-family: 'DM Sans', sans-serif;">

  <!-- HEADER -->
  <header class="flex items-center justify-between px-10 py-4 bg-neutral-100 dark:bg-[#1a1a1a] border-b border-neutral-200 dark:border-[#2a2a2a] sticky top-0 z-50">
    <div class="text-2xl font-extrabold tracking-tight" style="font-family: 'Syne', sans-serif;">
      Task<span class="text-accent">Flow</span>
    </div>
    <nav class="flex items-center gap-6">
      <a href="#" class="text-neutral-500 dark:text-neutral-400 text-sm hover:text-neutral-900 dark:hover:text-white transition-colors duration-200">Dashboard</a>
      <a href="#" class="text-neutral-500 dark:text-neutral-400 text-sm hover:text-neutral-900 dark:hover:text-white transition-colors duration-200">Equipo</a>
      <a href="#" class="text-neutral-500 dark:text-neutral-400 text-sm hover:text-neutral-900 dark:hover:text-white transition-colors duration-200">Ajustes</a>

      <!-- Botón modo oscuro/claro -->
      <button
        id="theme-toggle"
        class="ml-2 px-3 py-1.5 rounded-lg bg-neutral-200 dark:bg-[#2a2a2a] text-neutral-700 dark:text-neutral-300 text-sm font-medium hover:bg-neutral-300 dark:hover:bg-neutral-700 focus:outline-none focus:ring-2 focus:ring-accent transition-all duration-200"
      >
        <span id="theme-icon">☀️</span>
      </button>
    </nav>
  </header>

  <!-- LAYOUT -->
  <div class="grid grid-cols-1 md:grid-cols-[240px_1fr] min-h-[calc(100vh-61px)]">

    <!-- ASIDE -->
    <aside class="bg-neutral-100 dark:bg-[#1a1a1a] border-b md:border-b-0 md:border-r border-neutral-200 dark:border-[#2a2a2a] p-6 flex flex-row flex-wrap md:flex-col gap-1">
      <h2 class="text-[0.7rem] tracking-widest uppercase text-neutral-400 mb-1 w-full" style="font-family: 'Syne', sans-serif;">Categorías</h2>
      <div class="flex items-center px-4 py-2 rounded-xl bg-accent text-black font-medium text-sm cursor-pointer">📋 Todas</div>
      <div class="flex items-center px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-[#2a2a2a] transition-colors duration-200">💻 Desarrollo</div>
      <div class="flex items-center px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-[#2a2a2a] transition-colors duration-200">🎨 Diseño</div>
      <div class="flex items-center px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-[#2a2a2a] transition-colors duration-200">📊 Análisis</div>
      <div class="flex items-center px-4 py-2 rounded-xl text-neutral-500 dark:text-neutral-400 text-sm cursor-pointer hover:bg-neutral-200 dark:hover:bg-[#2a2a2a] transition-colors duration-200">📝 Documentación</div>
    </aside>

    <!-- MAIN -->
    <main class="p-6 md:p-10 overflow-y-auto">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-6" style="font-family: 'Syne', sans-serif;">
        Mis <span class="text-accent">Tareas</span>
      </h1>

      <!-- Formulario para añadir tareas -->
      <div class="flex gap-2 mb-6">
        <input
          type="text"
          id="task-input"
          placeholder="Escribe una nueva tarea..."
          class="flex-1 bg-neutral-100 dark:bg-[#1a1a1a] border border-neutral-200 dark:border-[#2a2a2a] rounded-xl px-4 py-3 text-sm text-neutral-900 dark:text-neutral-100 placeholder-neutral-400 outline-none focus:border-accent transition-all duration-200"
        />
        <button
          id="btn-add"
          class="bg-accent text-black font-bold text-sm px-5 py-3 rounded-xl hover:opacity-80 active:scale-95 transition-all duration-200"
          style="font-family: 'Syne', sans-serif;"
        >
          + Añadir
        </button>
      </div>

      <!-- Buscador (Bonus) -->
      <div class="flex items-center gap-2 mb-8 bg-neutral-100 dark:bg-[#1a1a1a] border border-neutral-200 dark:border-[#2a2a2a] rounded-xl px-4 py-2.5 transition-all duration-200">
        <span class="text-neutral-400">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Buscar tareas..."
          class="flex-1 bg-transparent text-sm text-neutral-900 dark:text-neutral-100 placeholder-neutral-400 outline-none"
        />
      </div>

      <!-- Lista de tareas -->
      <section>
        <h2 class="text-[0.75rem] tracking-widest uppercase text-neutral-400 mb-3 pb-2 border-b border-neutral-200 dark:border-[#2a2a2a]" style="font-family: 'Syne', sans-serif;">📋 Tareas</h2>
        <div id="task-list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
